# Test configuration
quarkus.arc.remove-unused-beans=false
quarkus.test.native-image-profile=test
quarkus.test.continuous-testing=enabled
quarkus.test.flat-class-path=true
# Align Quarkus coverage output with jacoco-maven-plugin
quarkus.jacoco.data-file=target/jacoco.exec
quarkus.jacoco.reuse-data-file=true

# Database configuration for tests
quarkus.mongodb.connection-string=mongodb://localhost:27017
quarkus.mongodb.database=test
quarkus.mongodb.devservices.enabled=true

# Audit logging performs live Mongo/Nitrite I/O on every mutating request via a global
# response filter, unconditionally — unlike every other store, it isn't @InjectMock-ed
# per test. Disabled for the general unit-test suite so the ~300 pre-existing resource
# tests (which mock their own target store and never depended on live Mongo before)
# don't newly depend on Mongo Dev Services being fast/available on every mutating call.
# Audit logging's own correctness is covered by the dedicated Test*Audit* unit tests
# (which set these flags directly, bypassing this config) and by the -P integration
# tests (whose profiles don't override this, so it stays enabled there deliberately).
calm.audit.store.enabled=false
calm.audit.log.enabled=false

# Standalone mode configuration
calm.database.mode=mongo
calm.standalone.data-directory=target/test-data
calm.standalone.database-name=calmSchemasTest
calm.standalone.username=admin
calm.standalone.password=admin
calm.standalone.init-script-path=src/test/resources/init-mongo.js
