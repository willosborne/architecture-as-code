<svg id="Layer_1" xmlns="http://www.w3.org/2000/svg" version="1.1" viewBox="0 1.0107 752.8649 215.0525">
  <!--
    White navbar lockup, for the dark theme.

    Derived from 2025_CALM_Horizontal_WHT.svg by dropping the two
    "COMMON ARCHITECTURE LANGUAGE MODEL" tagline paths, so the composition matches
    2025_CALM_Horizontal_Navbar_Logo.svg (the light navbar lockup): icon + CALM
    wordmark only.

    Removing the tagline is not enough on its own. In the full lockup the wordmark
    is set small to leave room for the tagline beneath it (0.44x the icon height);
    in the navbar lockup it is 0.688x. The <g> below scales and re-centres the
    wordmark to the light lockup's proportions, so the two files share an aspect
    ratio of 3.5007 and the logo does not resize when the theme is toggled.
  -->
  <defs>
    <style>
      .st0 {
        fill: #fff;
      }
    </style>
  </defs>
